<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeraNet – Webdesign</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <div class="logo">GeraNet</div>

  <div class="nav-right">
    <a href="#about" data-lang="nav_about">Über uns</a>
    <a href="#me" data-lang="nav_me">Über mich</a>
    <a href="#price" data-lang="nav_price">Anfrage</a>
    <a href="#contact" data-lang="nav_contact">Kontakt</a>

    <select id="lang">
      <option value="de">DE</option>
      <option value="ru">RU</option>
      <option value="ua">UA</option>
    </select>
  </div>
</nav>

<!-- HERO -->
<section id="hero">
  <div class="hero-content">
    <h1 data-lang="hero_title"></h1>
    <p data-lang="hero_p1"></p>
    <p data-lang="hero_p2"></p>
    <a href="#price" class="btn" data-lang="hero_btn"></a>
  </div>
</section>

<!-- ABOUT -->
<section id="about">
  <h1 data-lang="about_title"></h1>

  <p data-lang="about_p1"></p>
  <p data-lang="about_p2"></p>
  <p data-lang="about_p3"></p>
  <p data-lang="about_p4"></p>
</section>

<!-- ABOUT ME -->
<section id="me" class="me-section">

  <img class="me-img" src="https://i.ibb.co/KcDnsrzs/IMG-3143.jpg" alt="GeraNet Creator">

  <h1 class="typing-title" data-lang="me_title"></h1>

  <p class="typing-text" data-lang="me_text"></p>

</section>

<!-- PRICE / ORDER -->
<section id="price">

  <h1 data-lang="price_title"></h1>

  <div class="order-box">

    <h2 data-lang="order_title"></h2>

    <p data-lang="order_text1"></p>
    <p data-lang="order_text2"></p>
    <p data-lang="order_text3"></p>
    <p data-lang="order_text4"></p>

    <a class="btn" href="https://t.me/">Telegram</a>
    <a class="btn" href="https://instagram.com/">Instagram</a>

  </div>

  <div class="documents">
    <ul>
      <li><a href="https://docs.google.com/document/d/1-GLz_-DTqfBB4l8-cTMrRMik3scIN9OyW-dMY59wgjA/edit">Datenschutz Erklärung</a></li>
      <li><a href="https://docs.google.com/document/d/1-PpB_S4wFFowxGWyDT-yMOQwoVxI8RiJ1F5qZkdVGZ8/edit">Projektregeln</a></li>
      <li><a href="https://docs.google.com/document/d/109P3rnm7qVgGXjFwghw-ktSiOEM62Xnm2VQpmZetlK0/edit">Impressum</a></li>
    </ul>
  </div>

</section>

<!-- CONTACT -->
<section id="contact">
  <h1 data-lang="contact_title"></h1>
  <p data-lang="contact_text"></p>
</section>

<footer>
  © 2026 GeraNet – Webdesign
</footer>

<script src="script.js"></script>
</body>
</html>

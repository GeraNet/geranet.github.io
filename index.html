<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeraNet</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <div class="logo">GeraNet</div>

  <div class="nav-right">
    <a href="#hero" data-lang="nav_home">Start</a>
    <a href="#about" data-lang="nav_about">Über uns</a>
    <a href="#price" data-lang="nav_price">Preise</a>
    <a href="#docs" data-lang="nav_docs">Dokumente</a>
    <a href="#contact" data-lang="nav_contact">Kontakt</a>

    <select id="lang">
      <option value="de">DE</option>
      <option value="ru">RU</option>
      <option value="ua">UA</option>
    </select>
  </div>
</nav>

<!-- HERO -->
<section id="hero">
  <div class="hero-content">
    <h1 class="fade" data-lang="hero_title"></h1>
    <p class="fade" data-lang="hero_sub1"></p>
    <p class="fade" data-lang="hero_sub2"></p>

  </div>
</section>

<section id="about" class="fade">
  <h1 data-lang="about_title"></h1>
  <p data-lang="about_text"></p>

</section>

<!-- PRICE -->
<section id="price">
  <h1 class="fade" data-lang="price_title"></h1>

  <div class="cards">

    <div class="card fade">
      <h2 data-lang="p1_title"></h2>
      <p>80€</p>
      <p data-lang="p1_text"></p>
      <a class="btn" href="https://t.me/Duf7484">Telegram</a>
      <a class="btn" href="https://instagram.com">Instagram</a>
    </div>

    <div class="card fade">
      <h2 data-lang="p2_title"></h2>
      <p>100€</p>
      <p data-lang="p2_text"></p>
      <a class="btn" href="https://t.me/Duf7484">Telegram</a>
      <a class="btn" href="https://instagram.com">Instagram</a>

  </div>
</section>

    <a href="https://docs.google.com/document/d/1-GLz_-DTqfBB4l8-cTMrRMik3scIN9OyW-dMY59wgjA/edit">Datenschutz</a>
    <a href="https://docs.google.com/document/d/109P3rnm7qVgGXjFwghw-ktSiOEM62Xnm2VQpmZetlK0/edit">Impressum</a>
    <a href="https://docs.google.com/document/d/1-PpB_S4wFFowxGWyDT-yMOQwoVxI8RiJ1F5qZkdVGZ8/edit">Projektregeln</a>
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="fade">
  <h1 data-lang="contact_title"></h1>
  <p data-lang="contact_text"></p>

  <a class="btn" href="https://t.me/Duf7484">Telegram</a>
  <a class="btn" href="https://instagram.com">Instagram</a>
</section>

<footer>
  © 2026 GeraNet – Webdesign
</footer>

<script src="script.js"></script>
